services:
  drone-proxy:
    build: .
    container_name: drone-proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/infra/config.yml:/config/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CONFIG_PATH=/config/config.yml
      - MQTT_BROKER=localhost
      - MQTT_PORT=1883
      - MQTT_USER=eyesatop
      - MQTT_PASS=eyesatop
