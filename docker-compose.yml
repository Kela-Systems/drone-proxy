services:
  drone-proxy:
    build: .
    image: drone-proxy
    container_name: drone-proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ~/infra/config.yml:/config/config.yml:ro
      - ~/infra/data/identity.txt:/config/identity.txt:ro
      - ./app_config.yml:/app/app_config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - CONFIG_PATH=/config/config.yml
      - IDENTITY_PATH=/config/identity.txt
      - MQTT_BROKER=localhost
      - MQTT_PORT=1883
      - MQTT_USER=eyesatop
      - MQTT_PASS=eyesatop
